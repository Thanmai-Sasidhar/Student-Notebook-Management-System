<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload File</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#342fd0,#0ea5e9);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:650px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.card h2{
    text-align:center;
    color:#222;
    font-size:36px;
    margin-bottom:10px;
}

.card p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    display:flex;
    flex-direction:column;
    margin-bottom:25px;
}

.form-group label{
    font-weight:bold;
    margin-bottom:10px;
    color:#333;
}

.form-group input[type="file"]{
    border:2px dashed #4f46e5;
    border-radius:8px;
    padding:15px;
    background:#f8f9ff;
    cursor:pointer;
}

.form-group input[type="file"]::file-selector-button{
    background:#4f46e5;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    margin-right:15px;
}

.form-group input[type="file"]::file-selector-button:hover{
    background:#3730a3;
}

.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
}

.upload-btn{
    background:#4f46e5;
    color:#fff;
    border:none;
    padding:12px 30px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.upload-btn:hover{
    background:#3730a3;
}

.clear-btn{
    background:#ef4444;
    color:#fff;
    border:none;
    padding:12px 30px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.clear-btn:hover{
    background:#dc2626;
}

@media(max-width:768px){
    .card{
        padding:25px;
    }

    .button-group{
        flex-direction:column;
    }

    .upload-btn,
    .clear-btn{
        width:100%;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="card">

        <h2>Upload File</h2>
        <p>Select a file and upload it to the server.</p>

        <form method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="file">Choose File</label>
                <input type="file" id="file" name="file" required>
            </div>

            <div class="button-group">
                <button type="submit" class="upload-btn">Upload</button>
                <button type="reset" class="clear-btn">Clear</button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
