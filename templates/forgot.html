<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Notes Management System</title>

<style>
*{    
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.tabs{
    display:flex;
    margin-bottom:20px;
}

.tab-btn{
    flex:1;
    padding:12px;
    border:none;
    cursor:pointer;
    background:#ddd;
    font-weight:bold;
}

.tab-btn.active{
    background:#4f46e5;
    color:white;
}

.form{
    display:none;
}

.form.active{
    display:block;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
}

.input-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.btn{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    background:#4338ca;
}

.footer-text{
    text-align:center;
    margin-top:15px;
    color:#555;
}

.flash{
    background:#d4edda;
    color:#155724;
    padding:10px;
    margin-bottom:15px;
    border-radius:5px;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>Notes Management System</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<div class="flash">
    {{ message }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<!-- <div class="tabs">
    <button class="tab-btn active" onclick="showForm('login')">Login</button>
    <button class="tab-btn" onclick="showForm('register')">Register</button>
</div> -->

<!-- LOGIN FORM -->

<form id="login" class="form active" method="POST" action="{{ url_for('forgotpassword') }}">

    <div class="input-group">
        <label>Email</label>
        <input
            type="email"
            name="useremail"
            placeholder="Enter email"
            required>
    </div>


    <button type="submit" class="btn">
        Send OTP
    </button>

</form>
<a href="{{url_for('forgotpassword')}}">Forgot Password?</a>


<!-- REGISTER FORM -->



</div>

</body>
</html>
