{% extends 'dashboard.html' %}

{% block addcss %}
<link rel="stylesheet" href="{{ url_for('static', filename='viewallnotes.css') }}">
{% endblock %}

{% block content %}

<div class="notes-container">

    <div class="notes-card">

        <h2>My Notes</h2>

        <table class="notes-table">

            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Title</th>
                    <th>View</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody>

                {% for note in notes %}
                <tr>

                    <td>{{ loop.index }}</td>

                    <td>{{ note.title }}</td>

                    <td>
                        <a href="{{ url_for('viewnote', note_id=note.note_id) }}">
                            <button type="button" class="view-btn">
                                View
                            </button>
                        </a>
                    </td>

                    <td>
                        <a href="{{ url_for('updatenote', note_id=note.note_id) }}">
                            <button type="button" class="update-btn">
                                Update
                            </button>
                        </a>
                    </td>

                    <td>
                        <a href="{{ url_for('deletenote', note_id=note.note_id) }}"
                           onclick="return confirm('Are you sure you want to delete this note?')">
                            <button type="button" class="delete-btn">
                                Delete
                            </button>
                        </a>
                    </td>

                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
